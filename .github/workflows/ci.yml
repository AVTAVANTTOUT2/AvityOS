name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-macos-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      # Gitleaks compares the complete PR commit range. A shallow checkout
      # omits the base commit and makes the action fail before scanning.
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          # node:sqlite requires Node >= 22.5; repo is developed on 22+
          node-version: 22
          cache: pnpm

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      # Topological build first: tests import built workspace dependencies.
      # Typecheck resolves types from src (source-aware exports) and is
      # independently verified after.
      - name: Build TypeScript workspaces
        run: pnpm -r build

      - name: Run TypeScript tests
        run: pnpm -r test

      - name: Run TypeScript typecheck
        run: pnpm -r typecheck

      - name: Install Playwright Chromium
        run: pnpm --filter @avityos/web exec playwright install chromium

      - name: Run web end-to-end tests
        run: pnpm --filter @avityos/web test:e2e

      - name: Build macOS application
        working-directory: apps/macos
        run: swift build -Xswiftc -strict-concurrency=complete -Xswiftc -warnings-as-errors

      - name: Run Swift tests
        working-directory: apps/macos
        run: swift test -Xswiftc -strict-concurrency=complete -Xswiftc -warnings-as-errors

      - name: Run native macOS UI tests
        working-directory: apps/macos
        run: |
          xcodebuild test \
            -quiet \
            -project AvityOS.xcodeproj \
            -scheme AvityOS \
            -destination "platform=macOS" \
            -derivedDataPath "$RUNNER_TEMP/AvityOSUITests" \
            -resultBundlePath "$RUNNER_TEMP/AvityOSUITests.xcresult" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_STYLE=Manual

      - name: Build verified universal macOS application
        run: ./scripts/build-macos-app.sh

      - name: Upload native macOS evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: native-macos-evidence
          path: |
            ${{ runner.temp }}/AvityOSUITests.xcresult
            dist/macos/AvityOS-macos-universal.zip
            dist/macos/AvityOS-macos-universal.zip.sha256
          if-no-files-found: warn
          retention-days: 7

      - name: Audit production dependencies
        run: pnpm audit --audit-level high

      - name: Check dependency licenses
        run: pnpm licenses:check

      - name: Scan repository with Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload supply-chain evidence
        uses: actions/upload-artifact@v7
        with:
          name: supply-chain-evidence
          path: |
            license-report.json
            sbom.spdx.json
          retention-days: 7
