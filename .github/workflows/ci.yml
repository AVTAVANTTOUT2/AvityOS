name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: macos-14
    steps:
      # Gitleaks compares the complete PR commit range. A shallow checkout
      # omits the base commit and makes the action fail before scanning.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0

      - uses: actions/setup-node@v4
        with:
          # node:sqlite requires Node >= 22.5; repo is developed on 22+
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Topological build first: tests import built workspace dependencies.
      # Typecheck resolves types from src (source-aware exports) and is
      # independently verified after.
      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Install Playwright browser
        run: pnpm --filter @avityos/web exec playwright install chromium

      - name: Web browser E2E
        run: pnpm --filter @avityos/web test:e2e

      - name: Build native macOS app
        working-directory: apps/macos
        run: swift build

      - name: Test native macOS app
        working-directory: apps/macos
        run: swift test

      - name: Dependency vulnerability audit
        run: pnpm audit --audit-level high

      - name: Dependency license inventory
        run: pnpm licenses:check

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload supply-chain evidence
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-evidence
          path: |
            license-report.json
            sbom.spdx.json
