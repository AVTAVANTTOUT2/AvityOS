name: CI Linux

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-linux-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux system dependencies
        run: sudo apt-get update

      - name: Install Bubblewrap
        run: |
          sudo apt-get install -y bubblewrap
          bwrap --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Topological build first: tests import built workspace dependencies.
      # Typecheck resolves types from src (source-aware exports) and is
      # independently verified after.
      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Install Playwright Chromium
        run: pnpm --filter @avityos/web exec playwright install --with-deps chromium

      - name: Web browser E2E
        run: pnpm --filter @avityos/web test:e2e

      - name: Dependency vulnerability audit
        run: pnpm audit --audit-level high

      - name: Dependency license inventory
        run: pnpm licenses:check
