version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 10
    rebase-strategy: auto
    commit-message:
      prefix: deps
    groups:
      compatible-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
