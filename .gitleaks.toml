[extend]
useDefault = true

[allowlist]
description = "Synthetic non-secret values used only by security and interoperability tests"
regexTarget = "match"
regexes = [
  # Redaction unit test (control-plane contracts): deliberately secret-shaped
  # but non-secret constants asserted to be redacted/rejected.
  '''key=sk-abcdefghijklmnop1234''',
  '''token=sk-abcdefghijklmnop1234''',
  # contracts.test.ts "rejects common credential formats" — synthetic patterns
  # whose whole purpose is to prove the contract rejects credential shapes.
  '''ghp_abcdefghijklmnopqrstuvwxyz1234567890''',
  '''github_pat_abcdefghijklmnopqrstuvwxyz_1234567890''',
  '''eyJhbGciOiJIUzI1NiJ9\.eyJzdWIiOiIxMjM0NTY3ODkwIn0\.signature123''',
  '''glpat-abcdefghijklmnopqrst''',
  # operator/campaign redaction tests — fake tokens asserted to be redacted or
  # never persisted.
  '''ghp_abc123secret''',
  '''ghp_secret''',
  '''ghp_should_never_be_persisted''',
  '''sk-live-secret''',
]
paths = [
  # Public, generated interoperability vector. Its keypairs and pairing
  # material are synthetic, test-only and tied only to relay.example data.
  '''apps/macos/Tests/AvityOSTests/Fixtures/remote-bridge-vector\.json''',
]
